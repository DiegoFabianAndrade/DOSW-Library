spring:
  application:
    name: DOSW-Library
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:relational}

security:
  jwt:
    secret: ${JWT_SECRET_BASE64:VGhpc0lzQVN1cGVyU2VjcmV0S2V5VGhhdE11c3RCZUF0TGVhc3QzMkJ5dGVzTG9uZw==}
    ttl-ms: ${JWT_TTL_MS:3600000}
  bootstrap:
    librarian:
      username: ${BOOTSTRAP_LIBRARIAN_USERNAME:admin}
      password: ${BOOTSTRAP_LIBRARIAN_PASSWORD:Admin123!}
      name: ${BOOTSTRAP_LIBRARIAN_NAME:Administrador}

server:
  ssl:
    enabled: ${SSL_ENABLED:false}
    key-store: ${SSL_KEY_STORE:}
    key-store-password: ${SSL_KEY_STORE_PASSWORD:}
    key-store-type: ${SSL_KEY_STORE_TYPE:PKCS12}
    key-alias: ${SSL_KEY_ALIAS:tomcat}

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha
  show-actuator: false

---
spring:
  config:
    activate:
      on-profile: relational
  datasource:
    url: jdbc:postgresql://localhost:5432/dosw_library
    username: dosw
    password: dosw
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
  data:
    mongodb:
      repositories:
        enabled: false
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.mongo.MongoAutoConfiguration
      - org.springframework.boot.autoconfigure.mongo.MongoReactiveAutoConfiguration
      - org.springframework.boot.autoconfigure.data.mongo.MongoDataAutoConfiguration
      - org.springframework.boot.autoconfigure.data.mongo.MongoRepositoriesAutoConfiguration

---
spring:
  config:
    activate:
      on-profile: mongo
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration
      - org.springframework.boot.autoconfigure.jdbc.DataSourceTransactionManagerAutoConfiguration
      - org.springframework.boot.autoconfigure.orm.jpa.HibernateJpaAutoConfiguration
  data:
    mongodb:
      uri: ${MONGODB_URI:mongodb://127.0.0.1:27017/dosw_library}
      repositories:
        enabled: true
